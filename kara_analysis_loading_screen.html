
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
.screen{background:#F5F0E8;border-radius:16px;padding:0;overflow:hidden;min-height:540px;position:relative;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:#F5F0E8}
.logo{font-size:17px;font-weight:500;color:#1A1A1A;letter-spacing:-0.02em;cursor:pointer}
.logo span{color:#F4C24B}
.cancel-btn{font-size:13px;color:#6B6560;cursor:pointer;padding:6px 14px;border-radius:100px;border:0.5px solid #C8B89A;background:transparent}
.cancel-btn:hover{background:#EDE8DE}
.body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2rem 3rem;gap:0}
.album-wrap{position:relative;width:140px;height:140px;margin-bottom:2rem}
.album{width:140px;height:140px;border-radius:20px;background:#EDE8DE;overflow:hidden;position:relative}
.album-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#D3CFC5}
.album-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pulse-ring{position:absolute;inset:-10px;border-radius:30px;border:1.5px solid #C8B89A;animation:ringpulse 2s ease-out infinite;opacity:0}
.pulse-ring:nth-child(2){animation-delay:.6s}
.pulse-ring:nth-child(3){animation-delay:1.2s}
@keyframes ringpulse{0%{opacity:.6;inset:-4px}100%{opacity:0;inset:-22px}}
.song-title{font-size:20px;font-weight:500;color:#1A1A1A;text-align:center;letter-spacing:-0.02em;margin-bottom:4px;font-family:Georgia,serif}
.song-artist{font-size:13px;color:#6B6560;text-align:center;margin-bottom:2.5rem}
.steps{display:flex;flex-direction:column;gap:0;width:100%;max-width:320px;margin-bottom:2.5rem}
.step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #E8E2D8}
.step:last-child{border-bottom:none}
.step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .4s}
.step-icon.done{background:#1D9E75;color:#fff}
.step-icon.active{background:#1A1A1A;color:#F5F0E8;animation:iconpulse 1.2s ease-in-out infinite}
.step-icon.waiting{background:#EDE8DE;color:#C8B89A}
@keyframes iconpulse{0%,100%{opacity:1}50%{opacity:.6}}
.step-text{flex:1}
.step-label{font-size:13px;font-weight:500;color:#1A1A1A}
.step-label.waiting{color:#6B6560;font-weight:400}
.step-sub{font-size:11px;color:#6B6560;margin-top:1px}
.step-check{font-size:14px;color:#1D9E75}
.progress-track{width:100%;max-width:320px;height:3px;background:#EDE8DE;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:#1A1A1A;border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:12px;color:#6B6560;text-align:center;margin-top:.75rem}
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin-top:2rem}
.wbar{width:3px;border-radius:100px;background:#C8B89A;animation:wave 1.2s ease-in-out infinite}
</style>

<div class="screen">
  <nav class="nav">
    <span class="logo">kara<span>✦</span></span>
    <button class="cancel-btn" onclick="resetDemo()">Cancel</button>
  </nav>

  <div class="body">
    <div class="album-wrap">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="album">
        <div class="album-inner">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="#B4B2A9" stroke-width="1"/>
            <circle cx="24" cy="24" r="6" fill="#B4B2A9"/>
            <circle cx="24" cy="24" r="2" fill="#EDE8DE"/>
          </svg>
        </div>
        <div class="album-shimmer"></div>
      </div>
    </div>

    <div class="song-title" id="song-title">Fly Me to the Moon</div>
    <div class="song-artist" id="song-artist">Frank Sinatra</div>

    <div class="steps" id="steps-container">
      <div class="step" id="step-0">
        <div class="step-icon active" id="icon-0"><i class="ti ti-download" style="font-size:13px" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label" id="label-0">Downloading audio</div>
          <div class="step-sub" id="sub-0">Fetching from source...</div>
        </div>
        <span class="step-check" id="check-0" style="opacity:0">✓</span>
      </div>
      <div class="step" id="step-1">
        <div class="step-icon waiting" id="icon-1"><i class="ti ti-waveform" style="font-size:13px" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label waiting" id="label-1">Separating vocals</div>
          <div class="step-sub" id="sub-1">Waiting...</div>
        </div>
        <span class="step-check" id="check-1" style="opacity:0">✓</span>
      </div>
      <div class="step" id="step-2">
        <div class="step-icon waiting" id="icon-2"><i class="ti ti-text-caption" style="font-size:13px" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label waiting" id="label-2">Transcribing lyrics</div>
          <div class="step-sub" id="sub-2">Waiting...</div>
        </div>
        <span class="step-check" id="check-2" style="opacity:0">✓</span>
      </div>
      <div class="step" id="step-3">
        <div class="step-icon waiting" id="icon-3"><i class="ti ti-chart-line" style="font-size:13px" aria-hidden="true"></i></div>
        <div class="step-text">
          <div class="step-label waiting" id="label-3">Mapping pitch contour</div>
          <div class="step-sub" id="sub-3">Waiting...</div>
        </div>
        <span class="step-check" id="check-3" style="opacity:0">✓</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Preparing...</div>

    <div class="waveform" id="waveform"></div>
  </div>
</div>

<script>
const wf = document.getElementById('waveform');
for(let i=0;i<18;i++){
  const b=document.createElement('div');
  b.className='wbar';
  const h=8+Math.random()*20;
  b.style.cssText=`height:${h}px;animation-delay:${(i*0.07).toFixed(2)}s;animation-duration:${(0.8+Math.random()*0.6).toFixed(2)}s`;
  wf.appendChild(b);
}

const STEPS=[
  {label:'Downloading audio',  subs:['Fetching from source...','4.2 MB received...','Complete'],   dur:2200},
  {label:'Separating vocals',  subs:['Isolating vocal track...','Removing instruments...','Done'], dur:3000},
  {label:'Transcribing lyrics',subs:['Running Whisper model...','Aligning timestamps...','Done'],  dur:2600},
  {label:'Mapping pitch contour',subs:['Running CREPE...','Merging words + Hz...','Done'],         dur:2800},
];

let currentStep=0;
let stepTimer=null;
let progressInterval=null;
let pct=0;
let running=false;

function setStep(idx,state){
  const icon=document.getElementById('icon-'+idx);
  const lbl=document.getElementById('label-'+idx);
  const sub=document.getElementById('sub-'+idx);
  const chk=document.getElementById('check-'+idx);
  if(state==='active'){
    icon.className='step-icon active';
    lbl.className='step-label';
    lbl.textContent=STEPS[idx].label;
    sub.textContent=STEPS[idx].subs[0];
    chk.style.opacity='0';
    setTimeout(()=>{if(document.getElementById('sub-'+idx))sub.textContent=STEPS[idx].subs[1]},STEPS[idx].dur*0.45);
  } else if(state==='done'){
    icon.className='step-icon done';
    icon.innerHTML='<i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i>';
    lbl.className='step-label';
    sub.textContent=STEPS[idx].subs[2];
    chk.style.opacity='1';
  } else {
    icon.className='step-icon waiting';
    lbl.className='step-label waiting';
    sub.textContent='Waiting...';
    chk.style.opacity='0';
    icon.innerHTML=['<i class="ti ti-download" style="font-size:13px" aria-hidden="true"></i>',
      '<i class="ti ti-waveform" style="font-size:13px" aria-hidden="true"></i>',
      '<i class="ti ti-text-caption" style="font-size:13px" aria-hidden="true"></i>',
      '<i class="ti ti-chart-line" style="font-size:13px" aria-hidden="true"></i>'][idx];
  }
}

function startDemo(){
  running=true;
  currentStep=0;
  pct=0;
  document.getElementById('progress').style.width='0%';
  document.getElementById('progress-label').textContent='Preparing...';
  for(let i=0;i<4;i++) setStep(i,i===0?'active':'waiting');

  const totalDur=STEPS.reduce((a,s)=>a+s.dur,0);
  const tickMs=80;
  progressInterval=setInterval(()=>{
    pct=Math.min(pct+(tickMs/totalDur)*100,95);
    document.getElementById('progress').style.width=Math.round(pct)+'%';
    document.getElementById('progress-label').textContent=Math.round(pct)+'% complete';
  },tickMs);

  runStep(0);
}

function runStep(idx){
  if(idx>=STEPS.length){
    clearInterval(progressInterval);
    document.getElementById('progress').style.width='100%';
    document.getElementById('progress-label').textContent='Ready to sing!';
    setTimeout(()=>{ running=false; },800);
    return;
  }
  setStep(idx,'active');
  stepTimer=setTimeout(()=>{
    setStep(idx,'done');
    if(idx+1<STEPS.length) setStep(idx+1,'active');
    setTimeout(()=>runStep(idx+1),300);
  }, STEPS[idx].dur);
}

function resetDemo(){
  clearTimeout(stepTimer);
  clearInterval(progressInterval);
  pct=0;
  document.getElementById('progress').style.width='0%';
  document.getElementById('progress-label').textContent='Preparing...';
  for(let i=0;i<4;i++) setStep(i,'waiting');
  setTimeout(startDemo,400);
}

startDemo();
</script>
